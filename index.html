<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 ETF 수익률 대시보드 v1.00 | 노센스</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0c0c10;
  --s1:#141418;
  --s2:#1c1c23;
  --s3:#242430;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#eeeef0;
  --muted:#666672;
  --muted2:#999aaa;
  --up:#ff4d6a;       /* 상승 (한국식 빨강) */
  --up-dim:rgba(255,77,106,0.1);
  --down:#5b9cf6;     /* 하락 (한국식 파랑) */
  --down-dim:rgba(91,156,246,0.1);
  --accent:#00e5a0;
  --accent-dim:rgba(0,229,160,0.1);
  --accent-border:rgba(0,229,160,0.25);
  --yellow:#ffd166;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:2rem 1.25rem 4rem;
}

.page{max-width:720px;margin:0 auto;}

/* ── 채널 헤더 & 버전 배지 ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2rem;padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{
  width:42px;height:42px;border-radius:10px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;color:#0c0c10;
  letter-spacing:-0.5px;flex-shrink:0;
}
.brand-name{
  font-size:16px;font-weight:700;letter-spacing:-0.3px;
  display:flex;align-items:center;
}
.version-badge{
  font-size:10px;font-weight:800;color:var(--accent);
  background:var(--accent-dim);border:1px solid var(--accent-border);
  padding:2px 6px;border-radius:4px;margin-left:8px;
  letter-spacing:0.5px;
}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── 히어로 ── */
.hero{margin-bottom:1.5rem;}
.hero-tag{
  display:inline-block;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--yellow);background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.3);
  border-radius:4px;padding:3px 8px;margin-bottom:10px;
}
.hero-title{font-size:24px;font-weight:900;line-height:1.25;letter-spacing:-0.5px;}
.hero-desc{font-size:13px;color:var(--muted2);margin-top:8px;line-height:1.6;}

/* ── 국가 선택 탭 ── */
.tabs{
  display:flex;gap:8px;margin-bottom:1.5rem;
}
.tab{
  flex:1;padding:14px;border-radius:12px;
  font-size:14px;font-weight:800;text-align:center;
  cursor:pointer;color:var(--muted);
  transition:all 0.3s;border:1px solid var(--border);
  background:var(--s1);
  font-family:'Noto Sans KR',sans-serif;
}
.tab.active{
  background:var(--s3);color:#fff;
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent);
}

/* ── 차트 영역 ── */
.chart-section{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:1.25rem;margin-bottom:1.5rem;
}
.section-label{
  font-size:12px;font-weight:700;letter-spacing:1px;
  color:var(--muted2);margin-bottom:15px;
}
.chart-wrap{position:relative;width:100%;height:220px;}

/* ── 데이터 테이블 ── */
.table-container{
  width:100%; overflow-x:auto;
  background:var(--s1);border-radius:14px;
  border:1px solid var(--border);
}
.data-table{
  width:100%;border-collapse:collapse;min-width:500px;
}
.data-table th{
  font-size:11px;font-weight:700;color:var(--muted);
  padding:12px 14px;text-align:right;
  background:var(--s2);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.data-table th:first-child{text-align:left;}
.data-table td{
  font-size:13px;padding:12px 14px;
  border-bottom:1px solid var(--border);
  text-align:right;
  font-family:'Space Grotesk', 'Noto Sans KR', sans-serif;
  font-weight:500;
}
.data-table tr:last-child td{border-bottom:none;}
.data-table td:first-child{text-align:left;}

/* 종목명 스타일 */
.etf-name{font-weight:700;color:var(--text);font-size:13px;}
.etf-ticker{font-size:11px;color:var(--muted);display:block;margin-top:2px;}
.etf-category{
  display:inline-block;font-size:9px;padding:2px 5px;
  background:var(--s3);color:var(--muted2);border-radius:4px;
  margin-left:6px; vertical-align:middle;
}

/* 수익률 색상 */
.val-up{color:var(--up);font-weight:700;}
.val-down{color:var(--down);font-weight:700;}
.val-neu{color:var(--muted2);}

/* ── 푸터 ── */
.footer{
  text-align:center;margin-top:2.5rem;padding-top:1.5rem;
  border-top:1px solid var(--border);
  font-size:11px;color:var(--muted);
}
.footer b{color:var(--accent);}

@media(max-width:480px){
  .hero-title{font-size:20px;}
  .tab{padding:10px;font-size:13px;}
}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="brand">
      <div class="brand-logo">NS</div>
      <div>
        <div class="brand-name">노센스 <span class="version-badge">v1.00</span></div>
        <div class="brand-sub">경제·투자 인사이트</div>
      </div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-tag">데이터 보드</div>
    <h1 class="hero-title">국내외 주요 ETF Top 10<br>누적 수익률 현황</h1>
    <p class="hero-desc">카테고리별 대표 ETF의 연초 대비(YTD), 1년, 3년 누적 수익률을 한눈에 비교할 수 있습니다. (※ 수익률은 예시 데이터이며 직접 수정 가능합니다)</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-kr" onclick="setMarket('kr')">🇰🇷 한국 ETF Top 10</div>
    <div class="tab" id="tab-us" onclick="setMarket('us')">🇺🇸 미국 ETF Top 10</div>
  </div>

  <div class="chart-section">
    <div class="section-label" id="chart-title">📊 1년 누적 수익률 비교 (1Y)</div>
    <div class="chart-wrap">
      <canvas id="returnChart"></canvas>
    </div>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>종목명 (분류)</th>
          <th>연초대비 (YTD)</th>
          <th>1년 (1Y)</th>
          <th>3년 (3Y)</th>
        </tr>
      </thead>
      <tbody id="table-body">
        </tbody>
    </table>
  </div>

  <div class="footer">
    <b>노센스</b> · 경제·투자 인사이트 유튜브 채널 · ETF 누적 수익률 대시보드
  </div>
</div>

<script>
/* ================================================
  [데이터 수정 방법]
  아래 etfData 객체 안의 숫자를 수정하면 
  표와 차트가 자동으로 업데이트됩니다.
  ================================================
*/
const etfData = {
  kr: [
    { name: "KODEX 200", ticker: "069500", cat: "시장대표", ytd: 5.2, y1: 15.4, y3: 6.8 },
    { name: "TIGER 미국S&P500", ticker: "360750", cat: "해외지수", ytd: 12.5, y1: 28.3, y3: 45.2 },
    { name: "TIGER 미국나스닥100", ticker: "133690", cat: "해외지수", ytd: 15.8, y1: 42.1, y3: 65.4 },
    { name: "KODEX 2차전지산업", ticker: "305720", cat: "테마", ytd: -18.5, y1: -35.2, y3: 25.4 },
    { name: "TIGER 차이나전기차", ticker: "371460", cat: "테마", ytd: -8.2, y1: -28.4, y3: -55.2 },
    { name: "KODEX 반도체", ticker: "091160", cat: "섹터", ytd: 18.5, y1: 45.2, y3: 35.8 },
    { name: "TIGER 배당성장", ticker: "211560", cat: "배당", ytd: 7.5, y1: 14.2, y3: 22.1 },
    { name: "KODEX 레버리지", ticker: "122630", cat: "파생", ytd: 10.4, y1: 32.5, y3: 8.5 },
    { name: "KODEX 인버스", ticker: "114800", cat: "파생", ytd: -4.8, y1: -12.5, y3: -10.2 },
    { name: "TIGER 인도니프티50", ticker: "453870", cat: "해외지수", ytd: 11.2, y1: 25.8, y3: 48.5 }
  ],
  us: [
    { name: "SPDR S&P 500", ticker: "SPY", cat: "시장대표", ytd: 10.5, y1: 26.8, y3: 32.5 },
    { name: "Invesco QQQ", ticker: "QQQ", cat: "기술/성장", ytd: 14.2, y1: 40.5, y3: 45.8 },
    { name: "Vanguard Total", ticker: "VTI", cat: "시장대표", ytd: 9.8, y1: 24.5, y3: 28.4 },
    { name: "Tech Select Sector", ticker: "XLK", cat: "섹터(IT)", ytd: 16.5, y1: 45.2, y3: 58.4 },
    { name: "VanEck Semiconductor", ticker: "SMH", cat: "테마(반도체)", ytd: 28.5, y1: 65.4, y3: 95.2 },
    { name: "Health Care Select", ticker: "XLV", cat: "섹터(헬스)", ytd: 4.5, y1: 12.8, y3: 18.5 },
    { name: "Energy Select", ticker: "XLE", cat: "섹터(에너지)", ytd: 8.5, y1: 18.2, y3: 65.4 },
    { name: "Schwab US Dividend", ticker: "SCHD", cat: "배당", ytd: 3.5, y1: 10.2, y3: 15.8 },
    { name: "Vanguard Real Estate", ticker: "VNQ", cat: "부동산", ytd: -3.2, y1: 6.5, y3: -5.4 },
    { name: "iShares 20+ Year Bond", ticker: "TLT", cat: "채권", ytd: -6.5, y1: -12.4, y3: -35.2 }
  ]
};

let currentChart = null;

// 숫자 포맷팅 (양수면 +, 음수면 -, 소수점 1자리)
function formatReturn(val) {
  if (val > 0) return { text: `+${val.toFixed(1)}%`, cls: 'val-up' };
  if (val < 0) return { text: `${val.toFixed(1)}%`, cls: 'val-down' };
  return { text: `0.0%`, cls: 'val-neu' };
}

// 탭 전환 및 데이터 렌더링
function setMarket(market) {
  // 탭 스타일 변경
  document.getElementById('tab-kr').classList.remove('active');
  document.getElementById('tab-us').classList.remove('active');
  document.getElementById(`tab-${market}`).classList.add('active');

  const data = etfData[market];

  // 1. 테이블 생성
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  data.forEach(item => {
    const ytd = formatReturn(item.ytd);
    const y1 = formatReturn(item.y1);
    const y3 = formatReturn(item.y3);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <span class="etf-name">${item.name}</span> <span class="etf-category">${item.cat}</span>
        <span class="etf-ticker">${item.ticker}</span>
      </td>
      <td class="${ytd.cls}">${ytd.text}</td>
      <td class="${y1.cls}">${y1.text}</td>
      <td class="${y3.cls}">${y3.text}</td>
    `;
    tbody.appendChild(tr);
  });

  // 2. 차트 생성 (1년 수익률 기준)
  const labels = data.map(item => item.ticker);
  const chartData = data.map(item => item.y1);
  
  // 상승(빨강) 하락(파랑) 색상 배열
  const bgColors = chartData.map(val => val >= 0 ? 'rgba(255, 77, 106, 0.8)' : 'rgba(91, 156, 246, 0.8)');
  const borderColors = chartData.map(val => val >= 0 ? '#ff4d6a' : '#5b9cf6');

  if (currentChart) {
    currentChart.destroy();
  }

  const ctx = document.getElementById('returnChart').getContext('2d');
  currentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '1년 수익률(%)',
        data: chartData,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1c23',
          titleColor: '#eeeef0',
          bodyColor: '#fff',
          callbacks: {
            label: function(context) {
              let val = context.raw;
              return val >= 0 ? `+${val.toFixed(1)}%` : `${val.toFixed(1)}%`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#999aaa', font: { size: 10 } },
          grid: { display: false }
        },
        y: {
          ticks: { 
            color: '#666672', 
            font: { size: 10 },
            callback: value => value + '%'
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { display: false }
        }
      }
    }
  });

  document.getElementById('chart-title').innerText = market === 'kr' 
    ? '📊 한국 ETF 1년 누적 수익률 비교 (1Y)' 
    : '📊 미국 ETF 1년 누적 수익률 비교 (1Y)';
}

// 페이지 로드 시 초기화 (한국 시장 기본)
window.onload = () => {
  setMarket('kr');
};
</script>
</body>
</html>
